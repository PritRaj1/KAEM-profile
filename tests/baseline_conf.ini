[BASELINE]
model_type = vae
dataset = CIFAR10

[TRAINING]
batch_size = 10
N_train = 100
N_test = 50
num_generated_samples = 20
N_epochs = 2
device = gpu
verbose = false
checkpoint_every = 0
gen_every = 0

[OPTIMIZER]
type = adam
learning_rate = 0.001
betas = 0.9,0.999
decay = 0
ρ = 0.9
ε = 0.00000001

[LR_SCHEDULE]
decay = 1.0
milestone_epochs = 50, 100

[VAE]
latent_dim = 8
encoder_channels = 8, 16
decoder_channels = 16, 8
kernel_size = 4
batchnorm = false
beta = 1.0

[GAN]
latent_dim = 8
generator_channels = 32, 16
discriminator_channels = 16, 32
kernel_size = 4
batchnorm = false
n_critic = 1
lr_gen = 0.001
lr_disc = 0.001

[DDPM]
num_timesteps = 10
beta_start = 0.0001
beta_end = 0.02
channels = 16, 32
kernel_size = 3
time_dim = 16
