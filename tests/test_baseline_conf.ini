[BASELINE]
model_type = vae
dataset = CIFAR10

[TRAINING]
batch_size = 10
N_train = 100
N_test = 50
num_generated_samples = 20
N_epochs = 2
device = gpu
verbose = false
checkpoint_every = 0
gen_every = 0

[OPTIMIZER]
type = adam
learning_rate = 0.001
betas = 0.9,0.999
decay = 0
ρ = 0.9
ε = 0.00000001

[LR_SCHEDULE]
decay = 1.0
milestone_epochs = 50, 100

[VAE]
latent_dim = 8
encoder_channels = 8, 16
decoder_channels = 16, 8
encoder_strides = 2, 2
encoder_kernels = 4, 4
encoder_paddings = 1, 1
decoder_strides = 2, 2
decoder_kernels = 4, 4
decoder_paddings = 1, 1
batchnorm = false
beta = 1.0

[GAN]
latent_dim = 8
generator_channels = 32, 16
discriminator_channels = 16, 32
generator_strides = 2, 2, 1
generator_kernels = 4, 4, 3
generator_paddings = 1, 1, 1
discriminator_strides = 2, 2
discriminator_kernels = 4, 4
discriminator_paddings = 1, 1
batchnorm = false
n_critic = 1
lr_gen = 0.001
lr_disc = 0.001

[DDPM]
num_timesteps = 10
beta_start = 0.0001
beta_end = 0.02
channels = 16, 32
kernel_size = 3
time_dim = 16
sampling_stride = 1

[PANG]
latent_dim = 8
generator_channels = 32, 16
generator_strides = 2, 2
generator_kernels = 4, 4
generator_paddings = 1, 1
energy_widths = 50, 50, 1
prior_sgld_steps = 10
prior_sgld_step_size = 0.1
post_sgld_steps = 10
post_sgld_step_size = 0.01
noise_scale = 1.0
alpha_cd = 1.0
likelihood_variance = 0.3
