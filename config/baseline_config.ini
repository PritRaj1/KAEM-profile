[BASELINE]
model_type = vae
dataset = CIFAR10

[TRAINING]
batch_size = 50
N_train = 20000
N_test = 100
num_generated_samples = 3000
N_epochs = 100
device = gpu
verbose = true
checkpoint_every = 20
gen_every = 10

[OPTIMIZER]
type = adam
learning_rate = 0.0001
betas = 0.9,0.999
decay = 0.1
ρ = 0.9
ε = 0.000000008

[LR_SCHEDULE]
decay = 1.0
milestone_epochs = 100, 200

[VAE]
latent_dim = 128
encoder_channels = 32, 64, 128, 256
decoder_channels = 256, 128, 64, 32
kernel_size = 4
batchnorm = true
beta = 1.0

[GAN]
latent_dim = 128
generator_channels = 512, 256, 128, 64
discriminator_channels = 64, 128, 256, 512
kernel_size = 4
batchnorm = true
n_critic = 1
lr_gen = 0.0002
lr_disc = 0.0002

[DDPM]
num_timesteps = 1000
beta_start = 0.0001
beta_end = 0.02
channels = 64, 128, 256
kernel_size = 3
time_dim = 128

[PANG]
latent_dim = 128
generator_channels = 256, 128, 64, 32
energy_widths = 200, 200, 1
kernel_size = 4
prior_sgld_steps = 60
prior_sgld_step_size = 0.16
post_sgld_steps = 40
post_sgld_step_size = 0.01
noise_scale = 1.0
alpha_cd = 1.0
