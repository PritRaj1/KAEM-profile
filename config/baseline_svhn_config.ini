[TRAINING]
batch_size = 20
N_train = 20000
N_test = 100
num_generated_samples = 3000
N_epochs = 20
device = gpu
verbose = true
checkpoint_every = -1
gen_every = 2

[OPTIMIZER]
type = adam
learning_rate = 0.001
betas = 0.9,0.999
decay = 0.0005
ρ = 0.9
ε = 0.000000008

[LR_SCHEDULE]
decay = 1.0
milestone_epochs = 100, 200

[VAE]
latent_dim = 40
encoder_channels = 16, 32, 64
decoder_channels = 64, 32, 16
encoder_strides = 2, 2, 2
encoder_kernels = 4, 4, 4
encoder_paddings = 1, 1, 1
decoder_strides = 2, 2, 2
decoder_kernels = 4, 4, 4
decoder_paddings = 1, 1, 1
batchnorm = false
beta = 0.1

[GAN]
latent_dim = 81
generator_channels = 128, 64, 32
discriminator_channels = 32, 64, 128
generator_strides = 2, 2, 2, 1
generator_kernels = 4, 4, 4, 3
generator_paddings = 1, 1, 1, 1
discriminator_strides = 2, 2, 2
discriminator_kernels = 4, 4, 4
discriminator_paddings = 1, 1, 1
batchnorm = false
n_critic = 5
lr_gen = 0.01
lr_disc = 0.01

[DDPM]
num_timesteps = 10
beta_start = 0.01
beta_end = 0.2
channels = 32, 64, 128
kernel_size = 3
time_dim = 64

[PANG]
latent_dim = 81
generator_channels = 128, 64, 32
generator_strides = 2, 2, 2
generator_kernels = 4, 4, 4
generator_paddings = 1, 1, 1
energy_widths = 150, 150, 1
prior_sgld_steps = 60
prior_sgld_step_size = 0.4
post_sgld_steps = 40
post_sgld_step_size = 0.1
noise_scale = 1.0
alpha_cd = 1.0
