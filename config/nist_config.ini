[EbmModel]
layer_widths = 40, 81
spline_degree = 3
layernorm = false
base_activation = relu
spline_function = RBF
grid_size = 20
grid_update_ratio = 0.05
grid_range = -1.2,1.2
ε_scale = 0.1
μ_scale = 1
σ_base = 1
σ_spline = 1
init_τ = 1
τ_trainable = true
π_0 = gaussian
GaussQuad_nodes = 200
quadrature_method = gausslegendre

[MixtureModel]
use_mixture_prior = false
λ_reg = 0.0
use_attention_kernel = false
train_proportions = false

[GeneratorModel]
widths = 81, 162
spline_degree = 3
layernorm = false
base_activation = relu
spline_function = RBF
grid_size = 20
grid_update_ratio = 0.05
grid_range = -1.2,1.2 
ε_scale = 0.1
μ_scale = 1
σ_base = 1
σ_spline = 1
init_τ = 1
τ_trainable = true
generator_variance = 0.1
generator_noise = 0.1
output_activation = sigmoid
resampler = residual
perceptual_scale = 0.0001

[GRID_UPDATING]
update_prior_grid = true
update_llhood_grid = true
grid_update_frequency = 100
grid_update_decay = 0.999

[PRIOR_LANGEVIN]
step_size = 0.16
iters = 60

[POST_LANGEVIN]
use_langevin = false
initial_step_size = 0.001
step_size_bounds = 0.0001, 10
iters = 40

[THERMODYNAMIC_INTEGRATION]
num_temps = 0
p_start = 10
p_end = 8
num_cycles = 0
N_langevin_per_temp = 40

[TRAINING]
batch_size = 100
N_train = 50000
N_test = 100
num_generated_samples = 3000
N_epochs = 10
device = gpu
dataset = MNIST
update_grid = true
verbose = true
contrastive_divergence_training = true
resampling_threshold_factor = 0.5
eps = 0.001
checkpoint_every = 2
gen_every = 1
use_perceptual_loss = false

[CNN]
use_cnn_lkhood = false
hidden_feature_dims = 512, 256, 128, 64
strides = 2, 2, 2, 2, 2
kernel_sizes = 4, 4, 4, 4, 4
paddings = 1, 1, 1, 1, 1
latent_concat = false

[SEQ]
sequence_length = -1
vocab_size = 1000
activation = relu
d_model = 128

[OPTIMIZER]
type = adam
learning_rate = 0.001
betas = 0.9,0.999
decay = 0.1
ρ = 0.9
ε = 0.000000008

[LR_SCHEDULE]
decay = 1.0
milestone_epochs = 100, 200

[PCA]
use_pca = false
pca_components = 800

[SYMBOLIC_REG]
nonlin_threshold = 0.0000000000000001
reg_factor = 1.0
λ_total = 0.01
λ_l1 = 1.0
λ_entropy = 10.0
λ_coef = 0.0
λ_coefdiff = 0.0
regularize_prior = false
regularize_gen = false

[VARIATIONAL]
use_variational = false
beta = 1.0
num_cycles = 0
cycle_length = 100
annealing_fraction = 0.5

[Encoder]
type = diagonal
widths = 256, 128
channels = 32, 64, 128
strides = 2, 2, 2
kernel_sizes = 4, 4, 4
paddings = 1, 1, 1
batchnorm = false
