[EbmModel]
layer_widths = 40, 81
spline_degree = 3
layernorm = false
base_activation = relu
spline_function = RBF
grid_size = 10
grid_update_ratio = 0.05
grid_range = -1,1
ε_scale = 1
μ_scale = 1
σ_base = 1
σ_spline = 1
init_τ = 1
τ_trainable = true
π_0 = gaussian
GaussQuad_nodes = 200
quadrature_method = gausslegendre
wavelet_type = Morlet

[MixtureModel]
use_mixture_prior = true
λ_reg = 0.0
use_attention_kernel = false
train_proportions = false

[GeneratorModel]
widths = 81, 162
spline_degree = 3
layernorm = false
base_activation = gelu
spline_function = FFT
grid_size = 100
grid_update_ratio = 0.05
grid_range = -1.5,1.5 
ε_scale = 1
μ_scale = 1
σ_base = 1
σ_spline = 1
init_τ = 1
τ_trainable = false
generator_variance = 0.3
generator_noise = 0.1
output_activation = sigmoid
resampler = residual
perceptual_scale = 0.0001
wavelet_type = Morlet

[GRID_UPDATING]
update_prior_grid = true
update_llhood_grid = false
grid_update_frequency = 500
grid_update_decay = 0.999

[PRIOR_LANGEVIN]
step_size = 0.16
iters = 40

[POST_LANGEVIN]
use_langevin = true
initial_step_size = 0.01
step_size_bounds = 0.00001, 10
iters = 40

[THERMODYNAMIC_INTEGRATION]
num_temps = 5
p_start = 0.8
p_end = 4
num_cycles = 4
N_langevin_per_temp = 40
exchange_type = none

[TRAINING]
batch_size = 50
N_train = 20000
N_test = 2000
num_generated_samples = 3000
N_epochs = 20
device = gpu
dataset = MNIST
update_grid = true
verbose = true
contrastive_divergence_training = true
resampling_threshold_factor = 0.5
eps = 0.001
checkpoint_every = 5
gen_every = 5
use_perceptual_loss = false

[SEQ]
sequence_length = -1
vocab_size = 1000
activation = relu
d_model = 128

[CNN]
use_cnn_lkhood = true
hidden_feature_dims = 128, 64, 32, 16
strides = 1, 2, 2, 2, 2
kernel_sizes = 4, 4, 4, 4, 4
paddings = 0, 1, 1, 1, 1
activation = leakyrelu
batchnorm = false
latent_concat = false
projection = false
init_spatial = -1

[OPTIMIZER]
type = adam
learning_rate = 0.001
betas = 0.9,0.999
decay = 0
ρ = 0.9
ε = 0.00000008

[LR_SCHEDULE]
decay = 0.1
milestone_epochs = 5, 10, 15

[PCA]
use_pca = false
pca_components = 800

[TUNING]
num_trials = 100
sampler = bcap

[SYMBOLIC_REG]
nonlin_threshold = 0.0000000000000001
reg_factor = 1.0
λ_total = 0.01
λ_l1 = 1.0
λ_entropy = 10.0
λ_coef = 0.0
λ_coefdiff = 0.0
regularize_prior = false
regularize_gen = false
num_points_fitting = 100
fit_lower_bound = -10.0
fit_upper_bound = 10.0
max_iters = 100
