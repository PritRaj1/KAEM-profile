[EbmModel]
layer_widths = 100, 201
spline_degree = 3
layernorm = false
base_activation = relu
spline_function = RBF
grid_size = 20
grid_update_ratio = 0.05
grid_range = -1.2,1.2 
ε_scale = 0.1
μ_scale = 1
σ_base = 1
σ_spline = 1
init_τ = 1
τ_trainable = true
π_0 = gaussian
GaussQuad_nodes = 200
quadrature_method = gausslegendre
wavelet_type = Morlet

[MixtureModel]
use_mixture_prior = false
λ_reg = 0.0
use_attention_kernel = false
train_proportions = false

[GeneratorModel]
widths = 201
spline_degree = 3
layernorm = false
base_activation = relu
spline_function = RBF
grid_size = 20
grid_update_ratio = 0.05
grid_range = -1.2,1.2 
ε_scale = 0.1
μ_scale = 1
σ_base = 1
σ_spline = 1
init_τ = 1
τ_trainable = true
generator_variance = 0.3
generator_noise = 0.1
output_activation = sigmoid
resampler = residual
perceptual_scale = 0.0001
wavelet_type = Morlet

[GRID_UPDATING]
update_prior_grid = false
update_llhood_grid = true
grid_update_frequency = 100
grid_update_decay = 0.999

[PRIOR_LANGEVIN]
step_size = 0.16
iters = 60

[POST_LANGEVIN]
sampler = pcnl
pcnl_delta = 0.002
ula_eta = 0.01
iters = 25
N_unadjusted = 2

[THERMODYNAMIC_INTEGRATION]
num_temps = 5
p_start = 10
p_end = 8
num_cycles = 4
N_langevin_per_temp = 5
exchange_type = none

[TRAINING]
batch_size = 50
N_train = 50000
N_test = 100
num_generated_samples = 3000
N_epochs = 50
device = gpu
dataset = MNIST
update_grid = false
verbose = true
contrastive_divergence_training = true
resampling_threshold_factor = 0.5
eps = 0.0001
checkpoint_every = 10
gen_every = 1
use_perceptual_loss = false

[CNN]
use_cnn_lkhood = false
hidden_feature_dims = 256, 128, 64, 32
strides = 2, 2, 2, 2, 2
kernel_sizes = 4, 4, 4, 4, 4
paddings = 1, 1, 1, 1, 1
latent_concat = false
activation = relu
batchnorm = false
projection = false
init_spatial = -1

[SEQ]
sequence_length = 500
vocab_size = 500
activation = relu
d_model = 512

[OPTIMIZER]
type = adam
learning_rate = 0.0002
betas = 0.9,0.999
decay = 0
ρ = 0.9
ε = 0.00000008

[LR_SCHEDULE]
decay = 1.0
milestone_epochs = 100, 200

[PCA]
use_pca = false
pca_components = 800

[SYMBOLIC_REG]
nonlin_threshold = 0.0000000000000001
reg_factor = 1.0
λ_total = 0.01
λ_l1 = 1.0
λ_entropy = 10.0
λ_coef = 0.0
λ_coefdiff = 0.0
regularize_prior = false
regularize_gen = false
num_points_fitting = 100
fit_lower_bound = -10.0
fit_upper_bound = 10.0
max_iters = 100

[VARIATIONAL]
use_variational = false
beta = 1.0
num_cycles = 4
cycle_length = 100
annealing_fraction = 0.5

[Encoder]
type = diagonal
widths = 256, 128
channels = 32, 64, 128
strides = 2, 2, 2
kernel_sizes = 4, 4, 4
paddings = 1, 1, 1
batchnorm = false
