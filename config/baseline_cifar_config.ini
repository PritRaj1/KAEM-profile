[TRAINING]
batch_size = 50
N_train = 40000
N_test = 100
num_generated_samples = 20000
N_epochs = 100
device = gpu
verbose = true
checkpoint_every = -1
gen_every = 10

[OPTIMIZER]
type = adam
learning_rate = 0.0001
betas = 0.9,0.999
decay = 0.1
ρ = 0.9
ε = 0.00000008

[LR_SCHEDULE]
decay = 1.0
milestone_epochs = 100, 200

[VAE]
latent_dim = 81
encoder_channels = 64, 128, 256, 512
decoder_channels = 512, 256, 128, 64
encoder_strides = 2, 2, 2, 2
encoder_kernels = 4, 4, 4, 4
encoder_paddings = 1, 1, 1, 1
decoder_strides = 2, 2, 2, 2
decoder_kernels = 4, 4, 4, 4
decoder_paddings = 1, 1, 1, 1
batchnorm = false
beta = 0.01
learning_rate = 0.0001

[GAN]
latent_dim = 81
generator_channels = 256, 128, 64
discriminator_channels = 64, 128, 256
generator_strides = 2, 2, 2, 1
generator_kernels = 4, 4, 4, 3
generator_paddings = 1, 1, 1, 1
discriminator_strides = 2, 2, 2
discriminator_kernels = 4, 4, 4
discriminator_paddings = 1, 1, 1
batchnorm = false
n_critic = 1
lr_gen = 0.0001
lr_disc = 0.0001

[DDPM]
num_timesteps = 1000
beta_start = 0.0001
beta_end = 0.02
channels = 64, 128, 256, 512
kernel_size = 3
time_dim = 256
sampling_stride = 1
learning_rate = 0.0001

[PANG]
latent_dim = 81
generator_channels = 512, 256, 128, 64
generator_strides = 2, 2, 2, 2
generator_kernels = 4, 4, 4, 4
generator_paddings = 1, 1, 1, 1
energy_widths = 100, 100, 1
prior_sgld_steps = 60
prior_sgld_step_size = 0.16
post_sgld_steps = 40
post_sgld_step_size = 0.01
noise_scale = 1.0
alpha_cd = 1.0
likelihood_variance = 0.3
prior_sigma = 1.0
learning_rate = 0.0001
