[EbmModel]
layer_widths = 40, 81
spline_degree = 3
layernorm = false
base_activation = relu
spline_function = RBF
grid_size = 8
grid_update_ratio = 0.05
grid_range = -1,1
ε_scale = 1
μ_scale = 1
σ_base = 1
σ_spline = 1
init_τ = 10
τ_trainable = true
π_0 = gaussian
GaussQuad_nodes = 100
quadrature_method = gausslegendre
wavelet_type = Morlet

[MixtureModel]
use_mixture_prior = true
λ_reg = 0.0001
use_attention_kernel = false
train_proportions = true

[GeneratorModel]
widths = 81, 162
spline_degree = 3
layernorm = false
base_activation = gelu
spline_function = FFT
grid_size = 100
grid_update_ratio = 0.05
grid_range = -1.5,1.5 
ε_scale = 1
μ_scale = 1
σ_base = 1
σ_spline = 1
init_τ = 1
τ_trainable = false
generator_variance = 0.3
generator_noise = 0.1
output_activation = sigmoid
resampler = residual
perceptual_scale = 0.0001
wavelet_type = Morlet

[GRID_UPDATING]
update_prior_grid = true
update_llhood_grid = false
grid_update_frequency = 300
grid_update_decay = 0.996

[PRIOR_LANGEVIN]
step_size = 0.16
iters = 20

[POST_LANGEVIN]
sampler = pcnl
pcnl_delta = 0.01
ula_eta = 0.01
iters = 20

[THERMODYNAMIC_INTEGRATION]
num_temps = 5
p_start = 2
p_end = 2
num_cycles = 0
N_langevin_per_temp = 20
exchange_type = deo

[TRAINING]
batch_size = 50
N_train = 20000
N_test = 100
num_generated_samples = 20000
N_epochs = 100
device = gpu
dataset = MNIST
update_grid = true
verbose = true
contrastive_divergence_training = true
resampling_threshold_factor = 0.5
eps = 0.01
checkpoint_every = -1
gen_every = 10
use_perceptual_loss = false

[SEQ]
sequence_length = -1
vocab_size = 1000
activation = relu
d_model = 128

[CNN]
use_cnn_lkhood = true
hidden_feature_dims = 256, 128
strides = 2, 2, 2
kernel_sizes = 4, 4, 4
paddings = 1, 1, 1
activation = relu
batchnorm = false
latent_concat = false
projection = true
init_spatial = 4

[OPTIMIZER]
type = adam
learning_rate = 0.0002
betas = 0.9,0.999
decay = 0.1
ρ = 0.9
ε = 0.00000008

[LR_SCHEDULE]
decay = 1.0
milestone_epochs = 100, 200

[PCA]
use_pca = false
pca_components = 800

[SYMBOLIC_REG]
nonlin_threshold = 0.0000000000000001
reg_factor = 1.0
λ_total = 0.000001
λ_l1 = 1.0
λ_entropy = 10.0
λ_coef = 0.0
λ_coefdiff = 0.0
regularize_prior = false
regularize_gen = false
num_points_fitting = 100
fit_lower_bound = -10.0
fit_upper_bound = 10.0
max_iters = 100

[VARIATIONAL]
use_variational = false
beta = 0.01
num_cycles = 2
cycle_length = 4000
annealing_fraction = 0.5

[Encoder]
type = cnn
widths = 256, 128
channels = 64, 128, 256
strides = 2, 2, 2
kernel_sizes = 4, 4, 4
paddings = 1, 1, 1
batchnorm = false
