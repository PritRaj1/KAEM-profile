name: Python & notebook lint

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Lint Python & notebooks
        run: uv run --extra dev ruff check .

      - name: Check formatting
        run: uv run --extra dev ruff format --check .

      - name: Validate notebook format
        run: |
          uv run --extra notebook python -c "
          import nbformat, glob, sys
          ok = True
          for path in glob.glob('notebooks/*.ipynb'):
              try:
                  nbformat.read(path, as_version=4)

              except Exception as e:
                  print(f'INVALID: {path}: {e}')
                  ok = False

          if not ok:
              sys.exit(1)
          print('All notebooks valid')
          "
